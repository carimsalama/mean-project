<header class="header">
  <nav class="nav-container">

    <!-- Left Nav -->
    <ul class="nav-links nav-left">
      <li><a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Home</a></li>
      <li><a routerLink="/productlist" routerLinkActive="active">Products</a></li>
      <li><a routerLink="/faq" routerLinkActive="active">FAQ</a></li>
      <li><a routerLink="/contact" routerLinkActive="active">Contact</a></li>
      <li><a routerLink="/about" routerLinkActive="active">About Us</a></li>



    </ul>

    <!-- Logo -->
    <a routerLink="/" class="logo">Mla-Besco</a>

    <!-- Right Nav -->
    <ul class="nav-links nav-right">
      <li><a routerLink="/checkout" routerLinkActive="active">Checkout</a></li>
      <!-- <li><a routerLink="/orders" routerLinkActive="active">My Orders</a></li> -->
       
      @if(userData){
        @if (userData.role === 'admin') {
        <li><a routerLink="/dashboard" routerLinkActive="active">My Dashboard</a></li>
       }
        <li><a routerLink="/logout" routerLinkActive="active" (click)="logout()">Logout</a></li>

      }
      @else{
        <li><a routerLink="/login" routerLinkActive="active">Login</a></li>

      }
    </ul>

    <!-- Icons -->

    <div class="nav-icons">
     @if(userData){
      

<a routerLink="/profile" class="icon-btn" aria-label="Profile">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <circle cx="12" cy="8" r="4"/>
    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
  </svg>
</a>
      }
    
      <!-- Search -->
      <!-- <a routerLink="/productlist" class="icon-btn" aria-label="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </a>
       -->
      <!-- Wishlist -->
      <a routerLink="/orders" class="icon-btn" aria-label="Orders">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
    <rect x="9" y="3" width="6" height="4" rx="1" ry="1"/>
    <line x1="9" y1="12" x2="15" y2="12"/>
    <line x1="9" y1="16" x2="13" y2="16"/>
  </svg>
</a>
      <!-- Cart -->
      <a routerLink="/cart" class="icon-btn cart-btn" aria-label="Cart">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        
        @if(_cartCount | async; as count){

        @if (count > 0) {
          <span class="cart-badge">{{ count }}</span>
        }
      }
      </a>
    </div>

    <!-- Mobile hamburger -->
    <!-- <button class="hamburger" (click)="toggleMobileMenu()" aria-label="Toggle menu">
      <span [class.open]="mobileMenuOpen()"></span>
      <span [class.open]="mobileMenuOpen()"></span>
      <span [class.open]="mobileMenuOpen()"></span>
    </button> -->
  </nav>

  <!-- Mobile Menu -->
  <!-- <div class="mobile-menu" [class.open]="mobileMenuOpen()">
    <ul>
      @for (link of navLinks; track link.route) {
        <li>
          <a [routerLink]="link.route" (click)="toggleMobileMenu()">
            {{ link.label }}
            @if (link.badge && link.badge() > 0) {
              <span class="mobile-badge">{{ link.badge() }}</span>
            }
          </a>
        </li>
      }
    </ul>
  </div> -->
</header>
